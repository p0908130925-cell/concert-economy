<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演唱會經濟計算機 CTA</title>

<style>
/* ====== 你的原創背景與特效 - 保留不變 ====== */
body {
    margin: 0; font-family: "Microsoft JhengHei", sans-serif;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url("concert.jpg");
    background-size: cover; background-position: center; background-attachment: fixed;
    color: white; overflow-x: hidden;
}

.stage-light {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,0,200,0.25), transparent 60%);
    filter: blur(40px); animation: pulse 3s infinite; z-index: 0;
}

@keyframes pulse {
    0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
    100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
}

.container {
    position: relative; z-index: 2; max-width: 800px; margin: 80px auto;
    padding: 30px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(255,0,200,0.2);
}

h1 { text-align: center; color: #ff4df0; letter-spacing: 2px; margin-bottom: 10px; }
.subtitle { text-align: center; opacity: 0.7; margin-bottom: 30px; }
.row { display: flex; justify-content: space-between; margin: 15px 0; align-items: center; }
label { flex: 1; }
input { 
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4);
    color: white; outline: none; transition: 0.3s;
}
input:focus { border: 1px solid #ff4df0; box-shadow: 0 0 15px rgba(255,0,200,0.4); }

button {
    width: 100%; margin-top: 20px; padding: 16px;
    background: linear-gradient(90deg, #ff00cc, #6a00ff, #00d4ff);
    background-size: 200%; border: none; color: white;
    font-size: 16px; border-radius: 14px; cursor: pointer; transition: 0.4s;
}
button:hover { transform: scale(1.05); background-position: right; box-shadow: 0 0 25px rgba(255,0,200,0.5); }

/* ====== 新增：結果區優化 ====== */
.result {
    margin-top: 25px; padding: 25px; background: rgba(0,0,0,0.4);
    border-left: 4px solid #ff4df0; border-radius: 10px;
    font-size: 18px; line-height: 1.8;
}
.highlight-text { color: #00d4ff; font-weight: bold; font-size: 24px; }
.small { font-size: 12px; opacity: 0.6; text-align: center; margin-top: 10px; }
</style>
</head>

<body>

<div class="stage-light"></div>

<div class="container">
    <h1>🎤 演唱會經濟計算機</h1>
    <div class="subtitle">這場演唱會，將為這座城市帶來多少漣漪？</div>

    <div class="row"><label>票價（元）</label><input type="number" id="ticket" value="3200"></div>
    <div class="row"><label>周邊商品</label><input type="number" id="merch" value="1500"></div>
    <div class="row"><label>交通費</label><input type="number" id="transport" value="300"></div>
    <div class="row"><label>飲食費</label><input type="number" id="food" value="500"></div>

    <button onclick="calculate()">💥 啟動城市經濟分析</button>

    <div class="result" id="result" style="display:none;">
        <div id="output"></div>
    </div>

    <div class="small">一場演唱會，改變一座城市</div>
</div>

<script>
function calculate() {
    let t = Number(document.getElementById("ticket").value);
    let m = Number(document.getElementById("merch").value);
    let tr = Number(document.getElementById("transport").value);
    let f = Number(document.getElementById("food").value);

    let total = t + m + tr + f;
    // 模擬城市經濟乘數效應（例如：你的消費能為在地周邊產業帶來額外 2.5 倍的產值）
    let economicImpact = Math.round(total * 2.5);

    let level = total > 6000 ? "🔥 重度投資者" : (total > 3000 ? "🎶 城市樂迷" : "✨ 體驗玩家");
    
    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    
    document.getElementById("output").innerHTML = 
        `<div>你投入的金額：<span class="highlight-text">${total} 元</span></div>` +
        `<div>推算為城市注入的經濟產值：<br><span class="highlight-text" style="color:#ff4df0;">約 ${economicImpact} 元</span></div>` +
        `<p style="font-size:15px; border-top:1px solid rgba(255,255,255,0.1); margin-top:15px; padding-top:10px;">` +
        `等級判斷：${level}<br>` +
        `這場演唱會不僅是你個人的狂歡，更透過交通、飲食、住宿的鏈鎖效應，成為城市轉動的齒輪。` +
        `</p>`;
}
</script>

</body>
</html>
